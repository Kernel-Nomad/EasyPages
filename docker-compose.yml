services:
  easypages:
    container_name: easypages
    image: ghcr.io/kn990x/easypages
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      EASYPAGES_DATA_DIR: /data
    env_file:
      - .env
    volumes:
      - ./easypages-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8002/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
