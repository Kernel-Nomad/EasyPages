version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    ignore:
      - dependency-group: "dependencies"
        update-types: ["version-update:semver-major"] # Ignore major version updates for dependencies (Vite, esbuild, etc.)
    groups:
      dependencies:
        patterns:
          - "*"
